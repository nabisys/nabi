name: Feature Request
description: Propose a new feature or enhancement for Nabi
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Before filing, please:

        - Search existing issues to avoid duplicates.
        - Review [CONTRIBUTING.md](https://github.com/nabisys/nabi/blob/main/.github/CONTRIBUTING.md) for scope.

        **Note:** core runtime features (`nabi-core`, `nabi-io`, `nabi-runtime`, `nabi-orchestration`, `nabi-macros`) are maintainer-driven.
        External feature proposals are welcome for `nabi-compat`, platform backends (`net`, `fs`, `tls`), observability (`lens`, `scope`), `nabi-test`, the facade, docs, and examples.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which crate or area does this feature target?
      options:
        - nabi (facade)
        - nabi-compat
        - nabi-net
        - nabi-fs
        - nabi-tls
        - nabi-lens
        - nabi-scope
        - nabi-test
        - docs / examples
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this feature to work? API sketch or usage example welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered? Why is the proposal preferred?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
