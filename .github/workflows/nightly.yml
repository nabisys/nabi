name: Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/SHA to test'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  full-test:
    name: Full Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --profile ci --workspace --all-features
      - run: cargo test --doc --workspace --all-features

  full-safety:
    name: Full Safety
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-retag-fields -Zmiri-symbolic-alignment-check
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo +nightly miri setup
      - run: cargo +nightly miri nextest run --profile miri
      - env:
          RUSTFLAGS: --cfg loom
          LOOM_MAX_PREEMPTIONS: "3"
        run: cargo nextest run --release --profile loom -p nabi-runtime --lib

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features
