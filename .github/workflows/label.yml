name: Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  crate-labels:
    name: Crate Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@v6
        with:
          sync-labels: true

  unsafe-label:
    name: Unsafe Label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Detect unsafe keyword in diff
        run: |
          set -euo pipefail
          added=$(gh pr diff "$PR" --repo "$REPO" \
            | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          if echo "$added" | grep -qE '\bunsafe\b'; then
            echo "unsafe keyword detected in diff; applying safety:unsafe"
            gh pr edit "$PR" --repo "$REPO" --add-label "safety:unsafe"
          else
            echo "no unsafe keyword in diff"
          fi
