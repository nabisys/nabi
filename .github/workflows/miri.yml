name: Miri

on:
  push:
    branches: [main]
    paths:
      - "crates/nabi-core/**"
      - "crates/nabi-io/**"
      - "crates/nabi-runtime/**"
      - "crates/nabi-orchestration/**"
      - "!crates/**/LICENSE-*"
      - "!crates/**/*.md"
      - ".github/workflows/miri.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/nabi-core/**"
      - "crates/nabi-io/**"
      - "crates/nabi-runtime/**"
      - "crates/nabi-orchestration/**"
      - "!crates/**/LICENSE-*"
      - "!crates/**/*.md"
      - ".github/workflows/miri.yml"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-retag-fields -Zmiri-symbolic-alignment-check

jobs:
  miri:
    name: Miri (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [nabi-core, nabi-io, nabi-runtime, nabi-orchestration]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri setup
      - run: cargo +nightly miri test -p ${{ matrix.crate }}
