[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "aarch64-pc-windows-msvc" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CDLA-Permissive-2.0",
  "Zlib",
]

[[licenses.exceptions]]
name = "ring"
allow = ["ISC", "MIT", "OpenSSL"]

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
wildcards = "allow"

[[bans.deny]]
name = "tokio"
reason = "nabi-runtime is the async runtime; tokio is allowed in nabi-compat only"
wrappers = ["nabi-compat"]

[advisories]
ignore = []

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
